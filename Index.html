<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Energy Zones Prototype</title>
<style>
    body {
        margin: 0;
        font-family: system-ui, Arial, sans-serif;
        background: linear-gradient(135deg, #0ea5e9, #22c55e);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }
    .box {
        background: #ffffffee;
        padding: 24px;
        border-radius: 16px;
        text-align: center;
        max-width: 420px;
        width: 100%;
        box-shadow: 0 10px 30px rgba(0,0,0,0.18);
    }
    h1 {
        margin: 0 0 10px;
        font-size: 1.8rem;
        color: #0f172a;
    }
    .sub { 
        margin: 0 0 20px; 
        font-size: 0.95rem;
        color: #475569;
    }
    button {
        width: 100%;
        padding: 14px;
        margin: 6px 0;
        border: 0;
        border-radius: 10px;
        font-size: 1.1rem;
        cursor: pointer;
    }
    .wake { background: #e0f2fe; }
    .focus { background: #dcfce7; }
    .reset { background: #fef9c3; }
    .calm { background: #fee2e2; }
    small {
        display: block;
        margin-top: 15px;
        opacity: 0.7;
    }
</style>
</head>
<body>

<div class="box">
    <h1>Energy Zones</h1>
    <p class="sub">Choose a quick routine</p>

    <button class="wake" onclick="showPlan('Wake‑Up', ['Marching','Star Steps','Quick Feet'])">
        🔵 Wake‑Up Routine
    </button>

    <button class="focus" onclick="showPlan('Focus', ['Wall Pushes','Figure‑8 Arms','Balance Hold'])">
        🟢 Focus Routine
    </button>

    <button class="reset" onclick="showPlan('Reset', ['Twist & Breathe','Forward Fold','Step Turns'])">
        🟡 Reset Routine
    </button>

    <button class="calm" onclick="showPlan('Calm', ['Palm Press','Shoulder Rolls','Shape Breathing'])">
        🔴 Calm Routine
    </button>

    <small>Prototype • GitHub Pages Ready</small>
</div>

<script>
function showPlan(title, steps) {
    alert(title + " Routine:\n\n• " + steps.join("\n• "));
}
</script>

</body>
</html>
