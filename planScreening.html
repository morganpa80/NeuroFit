<!-- FILE: planScreening.html -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NeuroFit • Screening</title>

  <!-- CSS -->
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>

<body>

  <!-- Skip link -->
  <a href="#main-content" class="visually-hidden">Skip to main content</a>

  <!-- Header -->
  <header class="site">
    <div class="wrap brand">
      <img src="assets/img/logo.svg" alt="NeuroFit logo" />
      <h1>NeuroFit</h1>
    </div>
  </header>

  <!-- Main -->
  <main id="main-content" class="wrap">

    <section class="nf-hero">
      <div class="nf-hero-head">
        <h2 class="nf-hero-title">Your Plan, Your Way</h2>
        <p class="nf-hero-sub">
          Your questions adapt to your answers so your 6‑week plan fits how your body and mind usually feel.
        </p>
      </div>

      <p class="nf-hero-meta" id="progressText">Step 1 of ~40ish</p>
    </section>

    <!-- Question card target -->
    <section id="qCard" class="card" aria-live="polite"></section>

    <!-- Controls -->
    <div style="display:flex; gap:10px; margin-top:12px;">
      <button id="backBtn" class="btn secondary">Back</button>
      <button id="nextBtn" class="btn" disabled>Continue</button>
      <button id="finishBtn" class="btn" hidden>Build My Plan</button>
    </div>

    <p class="footnote">You can go back to change answers except on safety confirmations.</p>
  </main>

  <!-- JS -->
  <script src="assets/js/screening.js"></script>
</body>
</html>
