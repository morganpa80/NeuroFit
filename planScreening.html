<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NeuroFit • Screening</title>

    <!-- Global Styles -->
    <link rel="stylesheet" href="assets/css/styles.css" />

    <!-- Page-specific sprint tweaks -->
    <style>
        .sprint-wrap { margin-top: 20px; }
        #qCard { padding: 20px; }
        .nf-option { transition: background 0.2s, border 0.2s; }
        .nf-option.selected {
            background: var(--nf-blue-300);
            border-color: var(--nf-blue-700);
        }
        .skip-link {
            position:absolute;
            left:-999px;
            top:-999px;
        }
        .skip-link:focus {
            left:20px;
            top:20px;
            background:#fff;
            padding:8px 10px;
            border:2px solid var(--nf-blue-700);
        }
    </style>
</head>

<body>

<!-- Skip Link -->
<a class="skip-link" href="#main-content">Skip to main content</a>

<!-- Header -->
<header class="site" role="banner">
    <div class="wrap brand">
        <img src="assets/img/logo.svg" alt="NeuroFit logo" width="40" height="40" />
        <h1>NeuroFit</h1>
    </div>
</header>

<!-- Main -->
<main id="main-content" class="wrap" role="main" aria-describedby="screening-intro">

    <!-- Intro Hero -->
    <section class="nf-hero" aria-label="Screening intro">
        <div class="nf-hero-head">
            <h2 class="nf-hero-title">Your Plan, Your Way</h2>
            <p id="screening-intro" class="nf-hero-sub">
                Your questions adapt to your answers so your 6‑week plan fits how your body and mind usually feel.
            </p>
        </div>
        <p class="nf-hero-meta" id="progressText">Step 1 of ~40ish</p>
    </section>

    <!-- Question Card -->
    <section id="qCard"
             class="card sprint-wrap"
             role="region"
             aria-live="polite"
             aria-atomic="true">
        <!-- screening.js injects questions here -->
    </section>

    <!-- Controls -->
    <div style="display:flex; gap:10px; margin-top:12px;">
        <button id="backBtn" class="btn secondary" type="button">Back</button>
        <button id="nextBtn" class="btn" type="button" disabled>Continue</button>
        <button id="finishBtn" class="btn" type="button" hidden>Build My Plan</button>
    </div>

    <p class="footnote">
        You can go back to change answers except on safety confirmations.
    </p>

</main>

<!-- JS ENGINE (order matters) -->
<script src="assets/js/questions.js"></script>
<script src="assets/js/logic.js
</body>
</html>
<!-- NeuroFit Adaptive Engine -->
<script src="assets/js/questions.js?v=1"></script>
<script src="assets/js/logic.js?v=1"></script>
<script src="assets/js/compute.js?v=1"></script>
<script src="assets/js/router.js?v=1"></script>

<!-- Sprint Controller -->
<script src="assets/js/screening.js?v=1"></script>
``
