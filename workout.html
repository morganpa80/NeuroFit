<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NeuroFit — Workout Plan</title>

  <!-- NeuroFit styles -->
  <link rel="stylesheet" href="assets/styles.css" />

  <!-- Page-specific styling -->
  <style>
    /* (All original custom CSS preserved) */
    .precheck { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin:8px 0 6px; }        /* from your original file [1](https://whitchurchhighschool129-my.sharepoint.com/personal/morganpa_whitchurch_cardiff_sch_uk/_layouts/15/Doc.aspx?sourcedoc=%7B59360969-9EB3-4A9C-B8BB-83F007795714%7D&file=screening-teacher-12.html.docx&action=default&mobileredirect=true) */
    .gauge { display:inline-flex; align-items:center; gap:8px; padding:6px 10px; border-radius:999px; font-weight:700; color:#051014; }  /* original [1](https://whitchurchhighschool129-my.sharepoint.com/personal/morganpa_whitchurch_cardiff_sch_uk/_layouts/15/Doc.aspx?sourcedoc=%7B59360969-9EB3-4A9C-B8BB-83F007795714%7D&file=screening-teacher-12.html.docx&action=default&mobileredirect=true) */
    .g-red { background:#ff7d7d; }
    .g-amber { background:#ffb56a; }
    .g-yellow { background:#ffe66a; }
    .g-green { background:#77ffb1; }
    .legend { display:flex; gap:8px; align-items:center; color:var(--muted); font-size:.9rem; flex-wrap:wrap }
    .dot { width:10px; height:10px; border-radius:50% }
    .d-red{background:#ff7d7d}.d-amber{background:#ffb56a}.d-yellow{background:#ffe66a}.d-green{background:#77ffb1}
    .plan-meta { display:flex; gap:8px; flex-wrap:wrap; margin:8px 0 }
    .pill.blue { border-color:#5CC8FF; }
    .color-row{display:flex; gap:8px; flex-wrap:wrap; margin:8px 0}
    .color-tile{
      min-width:92px; padding:10px 12px; text-align:center; border-radius:10px;
      border:2px solid transparent; cursor:pointer; color:#041018; font-weight:700;
    }
    .color-tile[data-color="green"]  { background:#77ffb1; }
    .color-tile[data-color="yellow"] { background:#ffe66a; }
    .color-tile[data-color="amber"]  { background:#ffb56a; }
    .color-tile[data-color="red"]    { background:#ff7d7d; }
    .color-tile.selected{ outline:2px solid #5CC8FF; }
    .emoji-row{display:none; gap:10px; font-size:28px; line-height:36px; margin-top:8px}
    .emoji{cursor:pointer; filter:grayscale(60%); transition:.12s}
    .emoji.selected{filter:none; transform:scale(1.05)}
    .toggle-emoji{margin-left:8px}

    @media print{
      .post, .toggle-emoji, #emojiToggle { display:none !important; }
    }
  </style>
</head>

<body>

<header class="nf-header">
  <div class="wrap flex-between">
    <a href="index.html" class="nf-logo-wrap" aria-label="NeuroFit home">
      <img src="assets/logo.svg" alt="" width="28" height="28" />
      <span class="nf-title">NeuroFit</span>
    </a>

    <nav class="nf-nav" aria-label="Primary">
      <a href="index.html">Home</a>
      <a href="screening-teacher.html">Teacher Menu</a>
      <a href="screening-pupil.html">Pupil Check‑In</a>
    </nav>
  </div>
</header>

<main class="wrap">

  <!-- PLAN CARD -->
  <section class="card" aria-labelledby="plan-title">
    <h2 id="plan-title" style="padding-bottom:0;">Your 30‑Minute Plan</h2>

    <div class="body">

      <!-- Pre‑Workout Colour -->
      <div class="precheck" id="preWrap" aria-live="polite"></div>

      <!-- Tags / metadata -->
      <div class="plan-meta" id="planMeta"></div>

      <!-- Actions -->
      <div class="actions">
        <button id="printBtn">Print</button>
        <a id="editBtn" class="ghost" href="screening-teacher.html">Edit Answers</a>
      </div>

      <!-- Final generated plan -->
      <div id="plan" class="plan"></div>
    </div>
  </section>

  <!-- POST‑WORKOUT REFLECTION -->
  <section class="card post" aria-labelledby="post-title">
    <h2 id="post-title">How do you feel now?</h2>

    <div class="body">

      <div class="color-row" id="colorRow">
        <div class="color-tile" data-color="green"  aria-label="Green">🟩 Green</div>
        <div class="color-tile" data-color="yellow" aria-label="Yellow">🟨 Yellow</div>
        <div class="color-tile" data-color="amber"  aria-label="Amber">🟧 Amber</div>
        <div class="color-tile" data-color="red"    aria-label="Red">🟥 Red</div>
      </div>

      <label class="toggle-emoji">
        <input type="checkbox" id="emojiToggle" /> Prefer emojis?
      </label>

      <div class="emoji-row" id="emojiRow" aria-label="Emoji rating">
        <span class="emoji" data-map="green">😄</span>
        <span class="emoji" data-map="yellow">🙂</span>
        <span class="emoji" data-map="amber">😕</span>
        <span class="emoji" data-map="red">😣</span>
      </div>

    </div>
  </section>

</main>

<footer class="nf-footer">
  <div class="wrap">© NeuroFit</div>
</footer>

<!-- Shared App Engine -->
<script src="assets/app.js"></script>

<!-- =========================================================
     WORKOUT LOADING LOGIC (this was missing)
     ========================================================= -->
<script>
  // 1. Retrieve the stored screening data
  const answers = JSON.parse(sessionStorage.getItem('screeningAnswers'));
  const route   = JSON.parse(sessionStorage.getItem('screeningRoute'));
  const pre     = JSON.parse(sessionStorage.getItem('preColor'));

  // If missing (e.g. user refreshed), redirect safely
  if (!answers || !route || !pre) {
    location.href = "screening-teacher.html";
  }

  // 2. Insert Pre‑Workout colour
  const preWrap = document.getElementById("preWrap");
  if (preWrap) {
    preWrap.innerHTML = `
      <span class="gauge g-${pre.color}">
        ${pre.label} (score ${pre.score})
      </span>
    `;
  }

  // 3. Insert metadata (primary + tags)
  const meta = document.getElementById("planMeta");
  if (meta) {
    meta.innerHTML = `
      <div class="pill blue">Primary: ${route.primary}</div>
      ${route.tags.map(t => `<div class="pill">${t}</div>`).join("")}
    `;
  }

  // 4. Build 30‑minute plan
  const plan = document.getElementById("plan");
  if (plan) {
    const dom = App.buildPlanDOM(route);
    plan.appendChild(dom);
  }

  // 5. Print button
  document.getElementById('printBtn').onclick = () => window.print();

  // 6. Reflection system (colors + emojis)
  const colorRow = document.getElementById("colorRow");
  const emojiRow = document.getElementById("emojiRow");
  const emojiToggle = document.getElementById("emojiToggle");

  // Switch mode
  emojiToggle.addEventListener("change", () => {
    const useEmoji = emojiToggle.checked;
    emojiRow.style.display = useEmoji ? "flex" : "none";
    colorRow.style.display = useEmoji ? "none" : "flex";
  });

  // Select color tile
  colorRow.addEventListener("click", e => {
    if (!e.target.classList.contains("color-tile")) return;
    [...colorRow.children].forEach(c => c.classList.remove("selected"));
    e.target.classList.add("selected");
  });

  // Select emoji emoji
  emojiRow.addEventListener("click", e => {
    if (!e.target.classList.contains("emoji")) return;
    [...emojiRow.children].forEach(c => c.classList.remove("selected"));
    e.target.classList.add("selected");
  });
</script>

</body>
</html>
``
