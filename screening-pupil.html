<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NeuroFit — Pupil Check‑In</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>

<body>

<header class="nf-header">
  <div class="wrap flex-between">
    <a href="index.html" class="nf-logo-wrap">
      <img src="assets/logo.svg" width="32" height="32" alt="NeuroFit logo"/>
      <span class="nf-title">NeuroFit</span>
    </a>
    <nav class="nf-nav">
      <a href="index.html">Home</a>
      <a href="screening-teacher.html">Teacher Menu</a>
      <a href="screening-pupil.html" aria-current="page">Pupil Check‑In</a>
    </nav>
  </div>
</header>

<main class="wrap">

  <!-- INTRO -->
  <section class="card nf-hero">
    <h1>Pupil Check‑In</h1>
    <p class="sub">Choose the option that feels true for you. There are no wrong answers.</p>
    <div class="nf-inline-stats" style="margin-top:8px;">
      <div class="pill">Takes ~2 minutes</div>
      <div class="pill">No wrong answers</div>
      <div class="pill">Helps build your plan</div>
    </div>
  </section>

  <!-- QUESTIONS -->
  <section class="card">
    <h2>How are you feeling?</h2>

    <div class="body">

      <!-- Progress -->
      <div class="nf-progress-wrap" style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
        <div id="countText" class="sub">Answered: 0 / 12</div>
        <div style="flex:1;height:8px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden;">
          <div id="countBar" class="progress-bar-inner" style="width:0%"></div>
        </div>
      </div>

      <div id="qWrap"></div>

      <div class="footer-note" style="margin-top:8px;">
        Tip: Go with your first thought — this is a quick check‑in.
      </div>
    </div>

    <div class="actions">
      <button id="continueBtn">Continue to Workout</button>
      <button id="clearBtn" class="secondary">Clear</button>
    </div>
  </section>

</main>

<footer class="nf-footer">
  <div class="wrap">© NeuroFit</div>
</footer>

<script src="assets/app.js"></script>

<!-- Sprint Enhancer -->
<script>
function enhanceOptionPills({ container, onChange }) {
  const root = container;

  root.querySelectorAll('input[type="radio"]').forEach(input => {
    let label = input.closest('label');
    if (!label) {
      label = document.createElement('label');
      input.parentNode.insertBefore(label, input);
      label.appendChild(input);
    }
    label.classList.add('nf-option');

    if (!label.querySelector('.nf-option-text')) {
      const span = document.createElement('span');
      span.className = 'nf-option-text';
      span.textContent = input.value;
      label.appendChild(span);
    }
  });

  function updateSelected(name) {
    const group = root.querySelectorAll(`input[name="${CSS.escape(name)}"]`);
    group.forEach(radio => {
      const pill = radio.closest('.nf-option');
      if (pill) pill.classList.toggle('selected', radio.checked);
    });
  }

  root.addEventListener('change', e => {
    if (e.target && e.target.matches('input[type="radio"]')) {
      updateSelected(e.target.name);
      onChange && onChange();
    }
  });

  const names = new Set();
  root.querySelectorAll('input[type="radio"]').forEach(r => names.add(r.name));
  names.forEach(updateSelected);
}
</script>

<script>
/* ===== Pupil-friendly labels (mapped to CORE12 IDs) ===== */
const PUPIL_LABELS = {
  A1: "How is your energy?",
  A2: "How easy is it to focus?",
  A3: "How ready do you feel to move?",
  A4: "How does your body feel?",
  A5: "How are your feelings?",
  B11: "How do loud sounds feel?",
  B15: "Do you like gentle or strong pressure?",
  B16: "Do you enjoy turning or rocking?",
  C21: "How steady is your balance?",
  C25: "Is copying 3–4 moves easy?",
  E35: "Do you feel dizzy when turning?",
  E39: "Do you need a chair today?"
};

/* Render CORE12 */
const qWrap = document.getElementById('qWrap');
App.renderQuestions(qWrap, 'core12');

/* Apply pupil labels */
Object.entries(PUPIL_LABELS).forEach(([id, text]) => {
  const row = qWrap.querySelector(`[data-id="${id}"] label`);
  if (row) row.textContent = text;
});

/* Progress */
const coreItems = App.CORE12;
const total = coreItems.length;
const countText = document.getElementById('countText');
const countBar  = document.getElementById('countBar');

function updateProgress(){
  const vals = App.readAnswers();
  const answered = coreItems.filter(q=>vals[q.id]).length;
  countText.textContent = `Answered: ${answered} / ${total}`;
  countBar.style.width = Math.round(answered/total*100) + "%";
}

/* APPLY SPRINT UI HERE  */
enhanceOptionPills({ container: qWrap, onChange: updateProgress });

updateProgress();

/* Clear */
document.getElementById('clearBtn').onclick = ()=>{
  qWrap.querySelectorAll('input[type="radio"]').forEach(r=>r.checked=false);
  qWrap.querySelectorAll('.nf-option').forEach(p=>p.classList.remove('selected'));
  updateProgress();
  window.scrollTo({top:0,behavior:'smooth'});
};

/* Continue */
document.getElementById('continueBtn').onclick = () => {
  const values = App.readAnswers();
  const missing = coreItems.filter(q=>!values[q.id]);
  if(missing.length){ alert("Please answer all 12 questions."); return; }

  const {primary, tags} = App.route(values);
  const pre = App.computePreColor(values);

  sessionStorage.setItem('screeningAnswers',JSON.stringify(values));
  sessionStorage.setItem('screeningRoute',JSON.stringify({primary,tags,origin:'pupil'}));
  sessionStorage.setItem('preColor',JSON.stringify(pre));
  sessionStorage.setItem('planType','short-term');

  location.href = 'workout.html';
};
</script>

</body>
</html>
