<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NeuroFit — Pupil Check‑In</title>

  <!-- NeuroFit styles -->
  <link rel="stylesheet" href="assets/styles.css" />
</head>

<body>

<header class="nf-header">
  <div class="wrap flex-between">
    <a href="index.html" class="nf-logo-wrap">
      <img src="assets/logo.svg" alt="NeuroFit Logo" width="32" height="32" />
      <span class="nf-title">NeuroFit</span>
    </a>

    <nav class="nf-nav" aria-label="Primary">
      <a hrefeck‑In</a>
    </nav>
  </div>
</header>

<main class="wrap">

  <!-- INTRO -->
  <section class="card nf-hero">
    <h1>Pupil Check‑In</h1>
    <p class="sub">Choose the option that feels most true for you right now. There are no wrong answers.</p>

    <div class="nf-inline-stats" style="margin-top:8px;">
      <div class="pill">Takes ~2 minutes</div>
      <div class="pill">No wrong answers</div>
      <div class="pill">Helps build your plan</div>
    </div>
  </section>

  <!-- QUESTIONS -->
  <section class="card">
    <h2>How are you feeling?</h2>

    <div class="body">

      <!-- PROGRESS -->
      <div class="nf-progress-wrap" style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
        <div id="countText" class="sub">Answered: 0 / 12</div>
        <div style="flex:1;height:8px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden;">
          <div id="countBar" class="progress-bar-inner" style="width:0%"></div>
        </div>
      </div>

      <div id="qWrap"></div>

      <div class="footer-note" style="margin-top:8px;">
        Tip: Go with your first thought — this is just a quick check‑in.
      </div>
    </div>

    <div class="actions">
      <button id="continueBtn">Continue to Workout</button>
      <button id="clearBtn" class="secondary">Clear</button>
    </div>
  </section>

</main>

<footer class="nf-footer">
  <div class="wrap">© NeuroFit</div>
</footer>

<!-- Core logic -->
<script src="assets/app.js"></script>

<script>
/* =========================================================
   1) CHILD‑FRIENDLY QUESTION TEXT
   ---------------------------------------------------------
   We keep CORE12 IDs the same so app.js works perfectly,
   but we override the displayed labels to pupil wording.
   ========================================================= */
const PUPIL_LABELS = {
  A1: "How is your energy right now?",
  A2: "How easy is it to focus?",
  A3: "How ready do you feel to move?",
  A4: "How does your body feel?",
  A5: "How are your feelings right now?",
  B11: "How do your ears feel about noise?",
  B15: "How much body pressure or squeezing do you like?",
  B16: "How much do you enjoy turning or rocking?",
  C21: "How steady do you feel when balancing?",
  C25: "How easy is it to copy 3–4 short moves?",
  E35: "Do you feel dizzy when turning?",
  E39: "Do you need a chair option today?"
};

/* =========================================================
   2) RENDER CORE12 WITH PUPIL‑FRIENDLY TEXT
   ========================================================= */
const qWrap = document.getElementById('qWrap');

// Render teacher-style structure first (CORE12 only)
App.renderQuestions(qWrap, 'core12');

// Now replace Core12 labels with pupil-friendly versions
Object.entries(PUPIL_LABELS).forEach(([id, text]) => {
  const row = qWrap.querySelector(`[data-id="${id}"] label`);
  if (row) row.textContent = text;
});

/* =========================================================
   3) PROGRESS TRACKING
   ========================================================= */
const coreItems = App.CORE12;
const total = coreItems.length;
const countText = document.getElementById('countText');
const countBar = document.getElementById('countBar');

function updateProgress() {
  const vals = App.readAnswers();
  const answered = coreItems.filter(q => vals[q.id]).length;
  const pct = Math.round((answered / total) * 100);

  countText.textContent = `Answered: ${answered} / ${total}`;
  countBar.style.width = pct + "%";
}

// Delegate progress updates
qWrap.addEventListener('click', e => {
  if (e.target && e.target.matches('input[type="radio"]')) updateProgress();
});
qWrap.addEventListener('change', updateProgress);
updateProgress();

/* =========================================================
   4) CLEAR BUTTON
   ========================================================= */
document.getElementById('clearBtn').onclick = () => {
  qWrap.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
  qWrap.querySelectorAll('.opt').forEach(o => o.classList.remove('selected'));
  updateProgress();
  window.scrollTo({top:0, behavior:'smooth'});
};

/* =========================================================
   5) CONTINUE → VALIDATE → STORE → WORKOUT
   ========================================================= */
document.getElementById('continueBtn').onclick = () => {
  const values = App.readAnswers();

  const missing = coreItems.filter(q => !values[q.id]);
  if (missing.length) {
    alert("Please answer all 12 questions.");
    return;
  }

  const { primary, tags } = App.route(values);
  const pre = App.computePreColor(values);

  sessionStorage.setItem('screeningAnswers', JSON.stringify(values));
  sessionStorage.setItem('screeningRoute', JSON.stringify({ primary, tags, origin:'pupil' }));
  sessionStorage.setItem('preColor', JSON.stringify(pre));
  sessionStorage.setItem('planType', 'short-term');

  location.href = 'workout.html';
};
</script>

</body>
</html>
