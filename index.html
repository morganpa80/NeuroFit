<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>NeuroFit — Home</title>

<link rel="stylesheet" href="assets/styles.css" />
</head>

<body>

<header class="nf-header">
  <div class="wrap flex-between">
    <a href="index.html" class="nf-logo-wrap">
      <img src="assets/logo.svg" alt="NeuroFit Logo" width="36" height="36" />
      <span class="nf-title">NeuroFit</span>
    </a>
    <nav class="nf-nav">
      <a href="screening-pupil.html">Pupil Check‑In</a>
      <a href="screening-teacher.html">Teacher Planner</a>
    </nav>
  </div>
</header>

<main class="wrap">

  <!-- HERO -->
  <section class="card nf-hero">
    <h1>Welcome to NeuroFit</h1>
    <p class="sub">Movement‑based regulation made simple.</p>

    <div class="nf-btn-grid" style="margin-top:20px;">
      <a class="nf-btn" href="screening-pupil.html">NeuroFit Check‑In (Pupils)</a>
      <a class="nf-btn" href="screening-teacher.html">NeuroFit Planner (Teachers)</a>
    </div>
  </section>


  <!-- TRIAGE -->
  <section class="card" style="margin-top:28px;">
    <h2>Instant 10‑Minute Triage</h2>
    <div class="body">

      <p class="sub">Generate an immediate 10‑minute regulation routine:</p>

      <div class="nf-triage-grid" style="margin-bottom:10px;">

        <label class="nf-field">
          Current need:
          <select id="t_state">
            <option value="overloaded">Overloaded / Anxious</option>
            <option value="low">Low energy / Flat</option>
            <option value="ready">Learning‑ready / Steady</option>
          </select>
        </label>

        <label class="nf-field">
          Environment:
          <select id="t_env">
            <option value="standard">Standard</option>
            <option value="quiet">Quiet needed</option>
          </select>
        </label>

        <label class="nf-field">
          Seated option required?
          <select id="t_chair">
            <option value="no">No</option>
            <option value="yes">Yes</option>
          </select>
        </label>

      </div>

      <div class="actions">
        <button id="triageBtn">Generate 10‑Min Plan</button>
      </div>

      <div id="triageOut" class="plan"></div>

    </div>
  </section>

</main>

<footer class="nf-footer">
  <div class="wrap">© NeuroFit</div>
</footer>

<script src="assets/app.js"></script>
<script>
document.getElementById('triageBtn').onclick = () => {
  const state = document.getElementById('t_state').value;
  const quiet = document.getElementById('t_env').value === 'quiet';
  const chair = document.getElementById('t_chair').value === 'yes';

  const tri = App.triagePlan({state, quiet, chair});
  App.renderTriagePlan(document.getElementById('triageOut'), tri);
};
</script>

</body>
</html>
