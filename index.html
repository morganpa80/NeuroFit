<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>30‑Minute Movement Regulation Planner</title>

  <style>
    :root{
      --bg: #0e0f12;
      --panel: #151821;
      --ink: #e9eef6;
      --muted: #b9c3d6;
      --accent: #6ad2ff;
      --accent-2:#7cffc4;
      --danger:#ff7b7b;
      --ok:#9cff7a;
      --shadow: 0 8px 24px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      color:var(--ink);
      background:linear-gradient(180deg,#0d1117,#0b0d12 30%,#080a0f);
    }
    header{
      position:sticky; top:0; z-index:10;
      backdrop-filter:saturate(140%) blur(8px);
      background:linear-gradient(180deg, rgba(13,17,23,.85), rgba(13,17,23,.65));
      border-bottom:1px solid rgba(255,255,255,.06);
    }
    .wrap{max-width:1100px; margin:0 auto; padding:20px}
    h1{margin:0 0 6px}
    .sub{color:var(--muted)}

    main{display:grid; grid-template-columns: 1.1fr .9fr; gap:22px; padding:22px}
    @media(max-width:980px){main{grid-template-columns:1fr}}

    .card{
      background:linear-gradient(180deg,#121520,#11131b);
      border:1px solid rgba(255,255,255,.06);
      border-radius:14px;
      box-shadow:var(--shadow);
    }
    .card h2{margin:0; padding:16px 16px 0;}
    .body{padding:12px 16px 18px}

    .modeToggle{
      display:flex;
      gap:8px;
      margin-bottom:16px;
    }
    .modeToggle button{
      flex:1;
      border-radius:10px;
      padding:10px;
      cursor:pointer;
      border:1px solid rgba(255,255,255,.2);
      background:#111722;
      color:var(--ink);
      font-weight:600;
    }
    .modeToggle button.active{
      background:var(--accent);
      color:#041018;
      border-color:transparent;
    }

    .q{
      padding:12px 0;
      border-bottom:1px dashed rgba(255,255,255,.08);
    }
    .q label{font-weight:600}

    .opts{display:flex; flex-wrap:wrap; gap:8px; margin-top:6px}
    .opt{
      background:#0e111a;
      border:1px solid rgba(255,255,255,.12);
      padding:8px 10px;
      border-radius:10px;
      cursor:pointer;
      user-select:none;
    }
    .opt.selected{
      outline:2px solid var(--accent);
      border-color:transparent;
    }

    .actions{padding:14px 16px 18px; border-top:1px solid rgba(255,255,255,.06); display:flex; gap:10px}
    button{
      appearance:none; border:0; padding:10px 14px; border-radius:10px; font-weight:600; cursor:pointer;
      background:linear-gradient(180deg,var(--accent),#46b8ff); color:#04202a;
    }
    button.secondary{background:#2b3243; color:var(--ink)}
    button.ghost{
      background:none; border:1px solid rgba(255,255,255,.3); color:var(--ink);
    }

    .plan{padding:10px 16px 18px}
    .block{
      border:1px solid rgba(255,255,255,.08);
      border-radius:12px;
      padding:12px;
      margin:12px 0;
      background:linear-gradient(180deg,#0f1220,#0e111a);
    }
    .block .title{font-weight:700; display:flex; justify-content:space-between}
    .ex{padding-left:16px}
    .ex li{margin:6px 0}

    .notes{color:var(--muted); font-size:.9rem; margin-top:4px}

    @media print{
      body{background:#fff; color:#000}
      header{position:static; background:#fff; color:#000}
      .card{border:1px solid #bbb; box-shadow:none}
      .actions,.modeToggle{display:none}
    }
  </style>
</head>

<body>

<header>
  <div class="wrap">
    <h1>30‑Minute Movement Regulation Planner</h1>
    <div class="sub">Screen → Route → Print. Always 30 minutes: 5 / 20 / 5.</div>
  </div>
</header>

<main class="wrap">

  <section class="card">
    <h2 style="padding:16px">1) Screening Questionnaire</h2>

    <div class="body">
      <div class="modeToggle">
        <button id="fullBtn" class="active">Full 40‑Item</button>
        <button id="coreBtn">⭐ Core‑12 Only</button>
      </div>
      <div id="questionContainer"></div>
    </div>

    <div class="actions">
      <button id="generateBtn">Generate 30‑min Plan</button>
      <button class="secondary" id="clearBtn">Clear</button>
    </div>
  </section>

  <section class="card">
    <h2 style="padding:16px">2) Plan Output</h2>
    <div class="body">
      <button id="copyBtn" class="secondary">Copy as text</button>
      <button id="printBtn">Print</button>
      <div class="plan" id="plan"></div>
    </div>
  </section>

</main>

<script>
/* -------------------------
   Questionnaire Definition
------------------------- */
const Q = [
  // A group
  {id:'A1', group:'A', label:'Energy right now', star:true, options:['Low','OK','High']},
  {id:'A2', group:'A', label:'Focus right now', star:true, options:['Drifting','Steady','Fidgety']},
  {id:'A3', group:'A', label:'Motivation to move', star:true, options:['Not up for it','Could try','Ready']},
  {id:'A4', group:'A', label:'Body feeling', options:['Sluggish','Balanced','Tense']},
  {id:'A5', group:'A', label:'Emotional state', options:['Flat','Neutral','Worried/Overwired']},
  {id:'A6', group:'A', label:'Startle/overwhelm risk', options:['Low','Medium','High']},
  {id:'A7', group:'A', label:'Sequence following (3 steps)', options:['No','Maybe','Yes']},
  {id:'A8', group:'A', label:'Comfort being observed', options:['Prefer private','OK small group','OK whole class']},
  {id:'A9', group:'A', label:'Preferred pace', options:['Slow','Moderate','Lively']},
  {id:'A10', group:'A', label:'Pain/discomfort', options:['None','Mild','Noticeable']},

  // B group
  {id:'B11', group:'B', label:'Sound tolerance', star:true, options:['Prefer quiet','Neutral','Like a beat']},
  {id:'B12', group:'B', label:'Voice‑over tolerance', options:['Prefer minimal','Neutral','Prefer guidance']},
  {id:'B13', group:'B', label:'Visual complexity', options:['Low visuals','Neutral','Dynamic visuals OK']},
  {id:'B14', group:'B', label:'Light sensitivity', options:['Low','Medium','High']},
  {id:'B15', group:'B', label:'Proprioceptive input preference', options:['Gentle','Neutral','Strong (heavy work)']},
  {id:'B16', group:'B', label:'Vestibular input', options:['Avoid','Neutral','Enjoy']},
  {id:'B17', group:'B', label:'Rhythm patterns', options:['Prefer steady','Neutral','Varied OK']},
  {id:'B18', group:'B', label:'Breathing work', options:['Dislike','Neutral','Like it']},
  {id:'B19', group:'B', label:'Background noise tolerance', options:['Low','Medium','High']},
  {id:'B20', group:'B', label:'Screen sensitivity', options:['Short bursts','OK moderate','Fine long']},

  // C group
  {id:'C21', group:'C', label:'Balance confidence', star:true, options:['Not confident','OK','Confident']},
  {id:'C22', group:'C', label:'Upper body tolerance', options:['Low','Medium','High']},
  {id:'C23', group:'C', label:'Lower body tolerance', options:['Low','Medium','High']},
  {id:'C24', group:'C', label:'Crossing midline', options:['Hard','OK','Easy']},
  {id:'C25', group:'C', label:'Sequencing 3–4 moves', options:['Hard','OK','Easy']},
  {id:'C26', group:'C', label:'Impact tolerance', options:['Avoid','Maybe','OK']},
  {id:'C27', group:'C', label:'ROM limits', options:['Yes','No']},
  {id:'C28', group:'C', label:'Assistive/orthotic use', options:['Yes','No']},

  // D group
  {id:'D29', group:'D', label:'Instruction style', options:['Visual cards','Audio prompts','Live demo']},
  {id:'D30', group:'D', label:'Choice level', options:['Given a plan','Pick steps']},
  {id:'D31', group:'D', label:'Group context', options:['Solo','Partner','Small group','Whole class']},
  {id:'D32', group:'D', label:'Reward style', options:['Stars/points','Verbal praise','Quiet acknowledgement']},
  {id:'D33', group:'D', label:'Device access', options:['Own device','Shared screen','No device']},

  // E group
  {id:'E35', group:'E', label:'Dizziness when turning', options:['Never','Sometimes','Often']},
  {id:'E36', group:'E', label:'Breathlessness w/ mild activity', options:['No','Sometimes','Often']},
  {id:'E37', group:'E', label:'Recent injury/strain', options:['No','Upper','Lower','Back/Neck']},
  {id:'E38', group:'E', label:'Discomfort with breath exercises', options:['No','Yes']},
  {id:'E39', group:'E', label:'Need seated options', options:['No','Sometimes','Yes']},
  {id:'E40', group:'E', label:'Adult support available now', options:['No','Maybe','Yes']}
];

/* -------------------------
   UI Rendering
------------------------- */
const container = document.getElementById("questionContainer");
let mode = "full"; // full or core

function renderQuestions(){
  container.innerHTML = "";

  const groups = [
    ['A','Current State'],
    ['B','Sensory Preferences'],
    ['C','Motor & Coordination'],
    ['D','Engagement'],
    ['E','Safety & Contraindications']
  ];

  groups.forEach(([key,title])=>{
    const wrap = document.createElement('div');
    wrap.className = 'groupSection';

    const h = document.createElement('h3');
    h.textContent = `${key}) ${title}`;
    h.style.marginTop = "18px";
    wrap.appendChild(h);

    Q.filter(q=>q.group===key).forEach(q=>{
      const qDiv = document.createElement('div');
      qDiv.className = 'q';
      qDiv.dataset.id = q.id;

      const star = q.star ? " ⭐" : "";
      qDiv.innerHTML = `<label>${q.id}. ${q.label}${star}</label>`;

      const opts = document.createElement('div');
      opts.className = 'opts';

      q.options.forEach(op=>{
        const lab = document.createElement('label');
        lab.className='opt';
        lab.innerHTML = `<input type="radio" name="${q.id}" value="${op}"><span>${op}</span>`;
        lab.onclick = ()=>{
          [...opts.children].forEach(o=>o.classList.remove('selected'));
          lab.classList.add('selected');
          lab.querySelector('input').checked = true;
        }
        opts.appendChild(lab);
      });

      qDiv.appendChild(opts);
      wrap.appendChild(qDiv);
    });

    container.appendChild(wrap);
  });

  applyMode();
}

renderQuestions();

/* ----------------------------------
   Core‑12 Mode Visibility Control
----------------------------------- */
function applyMode(){
  Q.forEach(q=>{
    const block = container.querySelector(`[data-id="${q.id}"]`);
    if(!block) return;
    if(mode==="core" && !q.star){
      block.style.display="none";
    } else {
      block.style.display="";
    }
  });
}

document.getElementById("fullBtn").onclick = ()=>{
  mode="full";
  fullBtn.classList.add("active");
  coreBtn.classList.remove("active");
  applyMode();
};

document.getElementById("coreBtn").onclick = ()=>{
  mode="core";
  coreBtn.classList.add("active");
  fullBtn.classList.remove("active");
  applyMode();
};

/* -------------------------
   Helper
---------------------------*/
function val(id){
  const el = document.querySelector(`input[name="${id}"]:checked`);
  return el?.value || null;
}

/* -------------------------
   Routing Logic
------------------------- */
function route(){
  const v = Object.fromEntries(Q.map(q=>[q.id, val(q.id)]));

  // Safety tags
  const tags = new Set();
  if(['Sometimes','Often'].includes(v.E35)) tags.add('no-vestibular');
  if(v.E39 === 'Yes') tags.add('chair-mode');
  if(v.B11 === 'Prefer quiet' || v.B19 === 'Low') tags.add('low-noise');
  if(v.B13 === 'Low visuals') tags.add('low-visual');
  if(v.B15 === 'Strong (heavy work)' && v.C22 === 'High') tags.add('heavy-work');
  if(v.B18 === 'Dislike' || v.E38 === 'Yes') tags.add('no-breath-cues');
  if(v.B20 === 'Short bursts' || v.A3 === 'Not up for it') tags.add('short-bursts');

  // Primary route
  let primary="";
  if(v.A1==="Low" || v.A4==="Sluggish") primary="Wake Up";
  else if(v.A2==="Drifting") primary="Focus";
  else if(v.A4==="Tense" || v.A6==="High" || v.A2==="Fidgety") primary="Reset";
  else primary="Calm";

  if(v.A5==="Worried/Overwired") primary="Calm";

  return {v, primary, tags:[...tags]};
}

/* -------------------------
   Exercise Bank
------------------------- */
const BANK = {
  warmup: {
    common: [
      {name:'Forearm press + slow exhale (5×)', cues:'Strong hands, long slow exhale.', chair:'Same seated', quiet:true},
      {name:'Shoulder roll + shake out (8–10s)', cues:'Release neck, jaw.',chair:'Same seated'},
      {name:'Slow step backs ×10', cues:'Soft feet.', chair:'Seated march ×20'}
    ],
    wake:[{name:'Power march (60s)', cues:'Steady arms.', chair:'Seated march', quiet:true}],
    focus:[{name:'Cross‑crawl slow (30–45s)', cues:'Opp hand to knee.', chair:'Seated cross‑crawl'}],
    reset:[{name:'Wall angels (5–6)', cues:'Slow breath.', chair:'Seated wall slides'}],
    calm:[{name:'Hand press on thighs (5×5s)', cues:'Press–release.', chair:'Same seated', quiet:true}]
  },

  main: {
    "Wake Up":[
      {title:'Energise Circuit (×2)', suggestion:'Goal: Lift energy without chaos. Use steady, confident tempo.',
        list:[
          {name:'Power march / step‑ups (60–90s)', cues:'Steady, not bouncy.', chair:'Sit‑to‑stand or march', quiet:true},
          {name:'Wall push‑ups (8–12)', cues:'Strong push.', chair:'Incline desk push‑up'},
          {name:'Glute bridge hold (15–20s)', cues:'Drive heels.', chair:'Seated band pull‑apart ×10'}
        ]
      },
      {title:'Steady Strength', suggestion:'Goal: Activate large muscles for alertness.', list:[
        {name:'Hip hinge ×10', cues:'Long spine.', chair:'Seated hinge'},
        {name:'Backpack/tote carry (60s)', cues:'Walk tall.', chair:'Seated isometric thigh press 5×5s'}
      ]}
    ],

    "Focus":[
      {title:'Pattern Ladder (×2)', suggestion:'Goal: Predictable rhythm for attention anchoring.',
        list:[
          {name:'3‑move combo ×4', cues:'Keep beat.', chair:'Seated march→press→twist', quiet:true},
          {name:'Isometric squat hold (10–20s)', cues:'Knees track toes.', chair:'Seated ball squeeze'},
          {name:'Wall plank (20–30s)', cues:'Push floor away.', chair:'Seated desk push 5×5s'}
        ]
      },
      {title:'Heavy Work Focus', suggestion:'Goal: Muscle pressure to organise the system.',
        list:[
          {name:'Towel row ×10', cues:'Elbows back.', chair:'Same seated'},
          {name:'Slow mountain climbers (20–30s)', cues:'Controlled.', chair:'Seated knee lifts ×20'}
        ]
      }
    ],

    "Reset":[
      {title:'Grounded Power Circuit (×2)', suggestion:'Goal: Burn off adrenaline safely. Heavy + slow.',
        list:[
          {name:'Slow bear walk (6–8 steps)', cues:'Heavy hands/feet.', chair:'Seated contralateral press 5×5s'},
          {name:'Wall push‑ups (8–10)', cues:'Exhale on push.', chair:'Incline desk push‑up'},
          {name:'Glute bridge hold (10–15s)', cues:'Strong legs.', chair:'Seated hamstring press 5×5s'}
        ]
      },
      {title:'Controlled Strength + Breath', suggestion:'Goal: Strong body → slower mind.',
        list:[
          {name:'Slow mountain climbers (20–30s)', cues:'Slow pace.', chair:'Seated knee lifts ×20'},
          {name:'Isometric squat (10–15s)', cues:'Steady focus.', chair:'Seated quad set 5×5s'}
        ]
      },
      {title:'Down‑shift Movement', suggestion:'Goal: Start signalling calm.',
        list:[
          {name:'Forward fold (20s)', cues:'Soften knees.', chair:'Seated forward fold'},
          {name:'Seated figure‑four (each)', cues:'Easy breath.', chair:'Same seated'}
        ]
      }
    ],

    "Calm":[
      {title:'Slow Flow (×2)', suggestion:'Goal: Down‑shift + regulate breath through movement.',
        list:[
          {name:'Cat‑cow (60–90s)', cues:'Move with breath.', chair:'Seated cat‑cow', quiet:true},
          {name:'Wall slide (5–6)', cues:'Slow glide.', chair:'Seated wall slides'},
          {name:'Towel squeeze (5×5s)', cues:'Gentle pressure.', chair:'Same seated'}
        ]
      },
      {title:'Lengthen + Ground', suggestion:'Goal: Longer muscles = calmer system.',
        list:[
          {name:'Lunge rocks (30–45s)', cues:'Small range.', chair:'Seated ankle pumps ×20'},
          {name:'Chest opener 20s', cues:'Ease shoulders.', chair:'Seated open‑book stretch'}
        ]
      }
    ]
  },

  cooldown:{
    common:[{name:'Slow wall slides (5–6)', cues:'Smooth lower/lift.', chair:'Seated wall slides'}],
    breath:[{name:'4‑7‑8 breathing ×2', cues:'In4 • Hold7 • Out8', chair:'Same seated'}],
    movement:[
      {name:'Box reach 4 corners ×2', cues:'Slow reaches.', chair:'Seated version'},
      {name:'Neck ease (5× each)', cues:'Gentle range.', chair:'Same seated'}
    ]
  }
};

/* -------------------------
   Build Plan
------------------------- */
function buildPlan(){
  const {v, primary, tags} = route();

  // Check for unanswered
  const missing = Q.filter(q=>mode==="core" ? q.star && !val(q.id) : !val(q.id));
  if(missing.length){
    alert("Please complete all required questions.");
    return;
  }

  const plan = document.getElementById("plan");
  plan.innerHTML = "";

  // Header
  const head = document.createElement("div");
  head.innerHTML = `<div class="notes"><b>Primary: ${primary}</b></div>`;
  plan.appendChild(head);

  if(tags.length){
    const t = document.createElement("div");
    t.className="notes";
    t.textContent = "Tags: " + tags.join(", ");
    plan.appendChild(t);
  }

  /* WARM‑UP */
  const warmBlock = document.createElement('div');
  warmBlock.className='block';
  warmBlock.innerHTML = `<div class="title"><span>Warm‑up — Regulate</span><span>5 min</span></div>`;
  const warmList = document.createElement('ul'); warmList.className='ex';

  const warm = [
    ...BANK.warmup.common,
    ...(BANK.warmup[primary.toLowerCase()] || BANK.warmup[primary.replace(" ","")])
  ];

  warm.forEach(i=>{
    let name = i.name;
    if(tags.includes('chair-mode') && i.chair) name += ` (chair: ${i.chair})`;
    warmList.innerHTML += `<li>${name} — ${i.cues}</li>`;
  });

  warmBlock.appendChild(warmList);
  plan.appendChild(warmBlock);

  /* MAIN */
  const mainBlock = document.createElement('div');
  mainBlock.className='block';
  mainBlock.innerHTML = `<div class="title"><span>Main — Regulate + Fitness</span><span>20 min</span></div>`;

  BANK.main[primary].forEach(section=>{
    const h = document.createElement('h3'); h.textContent = section.title;
    mainBlock.appendChild(h);

    const sugg = document.createElement('div');
    sugg.className='notes';
    sugg.textContent = section.suggestion;
    mainBlock.appendChild(sugg);

    const ul = document.createElement('ul'); ul.className='ex';

    section.list.forEach(i=>{
      let name = i.name;
      if(tags.includes('chair-mode') && i.chair) name += ` (chair: ${i.chair})`;
      ul.innerHTML += `<li>${name} — ${i.cues}</li>`;
    });

    mainBlock.appendChild(ul);
  });

  plan.appendChild(mainBlock);

  /* COOL‑DOWN */
  const coolBlock = document.createElement('div');
  coolBlock.className='block';
  coolBlock.innerHTML = `<div class="title"><span>Cool‑down — Balance</span><span>5 min</span></div>`;

  const coolList = document.createElement('ul'); coolList.className='ex';
  let cool;

  if(tags.includes('no-breath-cues')){
    cool = [...BANK.cooldown.common, ...BANK.cooldown.movement];
  } else {
    cool = [...BANK.cooldown.common, ...BANK.cooldown.breath];
  }

  cool.forEach(i=>{
    let name = i.name;
    if(tags.includes('chair-mode') && i.chair) name += ` (chair: ${i.chair})`;
    coolList.innerHTML += `<li>${name} — ${i.cues}</li>`;
  });

  coolBlock.appendChild(coolList);
  plan.appendChild(coolBlock);
}

/* -------------------------
   Buttons
------------------------- */
document.getElementById("generateBtn").onclick = buildPlan;

document.getElementById("clearBtn").onclick = ()=>{
  document.querySelectorAll("input[type=radio]").forEach(i=>i.checked=false);
  document.querySelectorAll(".opt").forEach(o=>o.classList.remove('selected'));
  document.getElementById("plan").innerHTML="";
  window.scrollTo({top:0});
};

document.getElementById("printBtn").onclick = ()=> window.print();

document.getElementById("copyBtn").onclick = ()=>{
  const text = document.getElementById("plan").innerText;
  navigator.clipboard.writeText(text);
  alert("Plan copied to clipboard.");
};
</script>

</body>
</html>
