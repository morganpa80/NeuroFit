<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>NeuroFit — Home</title>
<link rel="stylesheet" href="assets/styles.css">
</head>

<body>

<header class="nf-header">
  <div class="wrap flex-between">
    <div class="nf-logo-wrap">
      <!-- Inline NeuroFit SVG Logo -->
      <img src="assets/logo.svg" alt="NeuroFit Logo" class="nf-logo">
      <span class="nf-title">NeuroFit</span>
    </div>
  </div>
</header>

<main class="wrap">

  <!-- HERO PANEL -->
  <section class="card nf-hero">
    <h1>Welcome to NeuroFit</h1>
    <p class="sub">
      Movement‑based regulation made simple — choose your path:
    </p>

    <div class="nf-btn-grid">

      <!-- Pupil Button -->
      <a href="screening-pupil.html" class="nf-btn primary">
        NeuroFit Check‑In (Pupils)
      </a>

      <!-- Teacher Button -->
      <a href="screening-teacher.html" class="nf-btn secondary">
        NeuroFit Planner (Teachers)
      </a>

    </div>
  </section>


  <!-- TRIAGE SECTION -->
  <section class="card" style="margin-top:28px;">
    <h2>Instant 10‑Minute Triage</h2>
    <div class="body">
      <p class="sub">A fast regulation tool based on current state.</p>

      <div class="nf-triage-grid">

        <label class="nf-field">
          Current need:
          <select id="t_state">
            <option value="overloaded">Overloaded / Anxious</option>
            <option value="low">Low energy / Flat</option>
            <option value="ready">Learning‑ready / Steady</option>
          </select>
        </label>

        <label class="nf-field">
          Environment:
          <select id="t_env">
            <option value="standard">Standard</option>
            <option value="quiet">Quiet needed</option>
          </select>
        </label>

        <label class="nf-field">
          Seated option needed?
          <select id="t_chair">
            <option value="no">No</option>
            <option value="yes">Yes</option>
          </select>
        </label>

      </div>

      <div class="actions">
        <button id="triageBtn">Generate 10‑min Plan</button>
      </div>

      <div id="triageOut" class="plan"></div>
      <div class="footer-note">Split: Warm‑up 2 · Main 6 · Cool‑down 2 minutes.</div>

    </div>
  </section>

</main>

<script src="assets/app.js"></script>
<script>
document.getElementById('triageBtn').onclick = ()=>{
  const state = document.getElementById('t_state').value;
  const quiet = document.getElementById('t_env').value === 'quiet';
  const chair = document.getElementById('t_chair').value === 'yes';
  const tri = App.triagePlan({state, quiet, chair});
  App.renderTriagePlan(document.getElementById('triageOut'), tri);
};
</script>

</body>
</html>
